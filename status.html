<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Статус бронювання — Sky Camp</title>
  <meta name="description" content="Перевірте статус вашого бронювання в Sky Camp за номером референсу."/>
  <meta name="robots" content="noindex"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/navigation.css"/>
  <style>
    .status-hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 60px;
      background: linear-gradient(135deg, var(--surface-container-lowest) 0%, var(--surface-container-low) 100%);
    }
    .status-card {
      background: var(--surface-container-lowest);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-level-3);
      padding: 48px;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .status-icon {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
    }
    .status-card h1 {
      font-size: clamp(22px, 4vw, 28px);
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--on-surface);
    }
    .status-card > p {
      color: var(--on-surface-variant);
      margin-bottom: 32px;
    }
    .search-form {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .search-form input {
      flex: 1;
      min-width: 200px;
      padding: 14px 18px;
      border: 2px solid var(--outline-variant);
      border-radius: var(--radius-lg);
      font-size: 15px;
      font-family: inherit;
      background: var(--surface-container-low);
      color: var(--on-surface);
      outline: none;
      transition: border-color 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .search-form input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(0, 93, 170, 0.1);
    }
    .search-form input::placeholder { text-transform: none; letter-spacing: 0; }
    .btn-search {
      padding: 14px 24px;
      background: var(--primary);
      color: var(--on-primary);
      border: none;
      border-radius: var(--radius-lg);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-search:hover { background: var(--primary-container); transform: translateY(-1px); }
    .btn-search:disabled { opacity: 0.7; cursor: wait; }

    /* Result */
    #result { margin-top: 32px; text-align: left; }
    .result-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--outline-variant);
    }
    .result-ref {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: 0.05em;
      background: var(--surface-container);
      padding: 4px 12px;
      border-radius: var(--radius-full);
    }
    .result-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--outline-variant);
      font-size: 14px;
    }
    .result-row:last-child { border-bottom: none; }
    .result-label { color: var(--on-surface-variant); font-weight: 500; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 14px;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 700;
    }
    .status-pending  { background: #fef3c7; color: #92400e; }
    .status-paid     { background: #dcfce7; color: #166534; }
    .status-cancelled{ background: #fee2e2; color: #991b1b; }

    .error-msg {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      background: var(--error-container);
      color: var(--on-error-container);
      border-radius: var(--radius-lg);
      font-size: 14px;
      font-weight: 500;
      margin-top: 16px;
    }
    .loading { opacity: 0.6; }

    @media (max-width: 600px) {
      .status-card { padding: 28px 20px; }
      .result-row  { grid-template-columns: 1fr; gap: 2px; }
    }
  </style>
  </head>
<body>
  <header class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand" aria-label="Sky Camp"><span class="brand-name">Sky Camp</span></a>
      <div style="display:flex; gap:16px; align-items:center;">
        
        <a href="index.html" class="btn btn-text" style="display:flex;align-items:center;gap:4px">
          <span class="material-symbols-outlined" style="font-size:20px">arrow_back</span>
          <span class="show-desktop" style="font-size:14px">Головна</span>
        </a>
      </div>
    </div>
  </header>

  <main class="status-hero">
    <div class="status-card">
      <span class="status-icon">📋</span>
      <h1>Статус бронювання</h1>
      <p>Введіть номер референсу, який ви отримали після бронювання (формат: SKY-2026-XXXXX)</p>

      <form class="search-form" id="status-form">
        <input
          type="text"
          id="ref-input"
          placeholder="SKY-2026-12345"
          pattern="SKY-\d{4}-\d{5}"
          maxlength="15"
          autocomplete="off"
          spellcheck="false"
          aria-label="Номер бронювання"
        />
        <button type="submit" class="btn-search" id="search-btn">
          <span class="material-symbols-outlined" style="font-size:18px">search</span>
          Перевірити
        </button>
      </form>

      <div id="result" aria-live="polite"></div>
    </div>
  </main>

  <script src="js/main.js" defer></script>
  <script>
    const form     = document.getElementById('status-form');
    const input    = document.getElementById('ref-input');
    const btn      = document.getElementById('search-btn');
    const resultEl = document.getElementById('result');

    // Auto-format input as user types
    input.addEventListener('input', () => {
      let v = input.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
      // Auto-insert dashes: SKY-2026-XXXXX
      if (v.length > 3 && !v.includes('-')) v = v.slice(0,3) + '-' + v.slice(3);
      if (v.length > 8 && v.split('-').length < 3) v = v.slice(0,8) + '-' + v.slice(8);
      input.value = v.slice(0, 15);
    });

    // Pre-fill from URL param ?ref=SKY-2026-XXXXX
    const urlRef = new URLSearchParams(location.search).get('ref');
    if (urlRef) { input.value = urlRef.toUpperCase(); form.dispatchEvent(new Event('submit')); }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const ref = input.value.trim().toUpperCase();
      if (!ref.match(/^SKY-\d{4}-\d{5}$/)) {
        showError('Невірний формат. Приклад: SKY-2026-12345');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;animation:spin 1s linear infinite">sync</span> Перевіряю...';
      resultEl.innerHTML = '';

      try {
        const res  = await fetch(`/api/bookings/${ref}`);
        const data = await res.json();

        if (!res.ok || !data.ok) {
          showError(data.error || 'Бронювання не знайдено. Перевірте номер референсу.');
          return;
        }

        const b = data.booking;
        const statusLabel = { pending:'В обробці', paid:'Оплачено', cancelled:'Скасовано' };
        const statusEmoji = { pending:'⏳', paid:'✅', cancelled:'❌' };

        resultEl.innerHTML = `
          <div class="result-header">
            <span class="result-ref">${b.booking_ref}</span>
            <span class="status-badge status-${b.status}">
              ${statusEmoji[b.status]} ${statusLabel[b.status] || b.status}
            </span>
          </div>
          <div class="result-row">
            <span class="result-label">Програма</span>
            <span>${esc(b.program)}</span>
          </div>
          <div class="result-row">
            <span class="result-label">Дати</span>
            <span>${esc(b.dates)}</span>
          </div>
          <div class="result-row">
            <span class="result-label">Вартість</span>
            <span>₴${Number(b.price).toLocaleString('uk-UA')}</span>
          </div>
          <div class="result-row">
            <span class="result-label">Дитина</span>
            <span>${esc(b.child_first)} ${esc(b.child_last)}</span>
          </div>
          <div class="result-row">
            <span class="result-label">Дата заявки</span>
            <span>${b.created_at?.slice(0,16) || '—'}</span>
          </div>
          ${b.status === 'pending' ? `
          <div style="margin-top:20px;padding:14px;background:var(--surface-container);border-radius:var(--radius-lg);font-size:13px;color:var(--on-surface-variant)">
            <strong>⏳ Ваше бронювання очікує підтвердження.</strong>
            Наш менеджер зв'яжеться з вами протягом 24 годин для уточнення деталей оплати.
          </div>` : ''}
          ${b.status === 'paid' ? `
          <div style="margin-top:20px;padding:14px;background:#dcfce7;border-radius:var(--radius-lg);font-size:13px;color:#166534">
            <strong>✅ Оплата підтверджена!</strong>
            Ваше місце в таборі заброньовано. Очікуйте листа з деталями підготовки.
          </div>` : ''}
        `;
      } catch {
        showError('Помилка зв\'язку із сервером. Спробуйте пізніше.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px">search</span> Перевірити';
      }
    });

    function showError(msg) {
      resultEl.innerHTML = `<div class="error-msg"><span class="material-symbols-outlined">error</span>${msg}</div>`;
    }
    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
